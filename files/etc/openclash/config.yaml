mixed-port: 7890
allow-lan: true
bind-address: "*"

mode: rule
log-level: silent

external-controller: 0.0.0.0:9090

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - 1.1.1.1
    - 8.8.8.8

  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

proxies: []

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - DIRECT

rules:
  - GEOIP,CN,DIRECT
  - MATCH,🚀 节点选择
