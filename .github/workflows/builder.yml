name: ImmortalWrt Builder (TR3000 Pro)

permissions:
  contents: write

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEVICE_INPUT: 256M
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main

      - name: Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential ccache git wget curl python3

      - name: Clone Source
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf $PWD/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load DIY1
        run: |
          chmod +x diy-part1.sh
          cd openwrt
          $GITHUB_WORKSPACE/diy-part1.sh

      - name: Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load DIY2
        run: |
          chmod +x diy-part2.sh
          cd openwrt
          $GITHUB_WORKSPACE/diy-part2.sh

      - name: Load Config
        run: |
          cp config/256m.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Download
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile (⚡优化)
        run: |
          cd openwrt
          make -j$(nproc) CC="ccache gcc" || make -j1 V=s

      - name: Collect Firmware
        run: |
          mkdir firmware
          find openwrt/bin/targets/ -name "*sysupgrade.bin" -exec cp {} firmware/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TR3000-Firmware
          path: firmware/*
